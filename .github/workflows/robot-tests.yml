name: Robot Framework TNR Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
      
      - name: Install Robot Framework
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install webdriver-manager
      
      - name: Start PetClinic
        run: |
          docker run -d -p 8080:8080 --name petclinic springcommunity/spring-framework-petclinic
          sleep 30
          curl -s http://localhost:8080 || echo "Waiting..."
      
      - name: Run Tests
        run: |
          xvfb-run --auto-servernum robot --outputdir results tests/
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/