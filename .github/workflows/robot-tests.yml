name: Robot Framework TNR Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install webdriver-manager

      - name: Install Chrome and matching ChromeDriver
        run: |
          pip install selenium webdriver-manager
          python -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          print(ChromeDriverManager().install())
          "

      - name: Start PetClinic
        run: |
          docker run -d -p 8080:8080 --name petclinic springcommunity/spring-framework-petclinic
          echo "Waiting for PetClinic..."
          for i in {1..24}; do
              if curl -s http://localhost:8080 > /dev/null; then
                  echo "PetClinic is up!"
                  break
              fi
              echo "Attempt $i: not ready yet..."
              sleep 5
          done
          sleep 10  

      - name: Run Robot Framework Tests
        run: |
          robot --outputdir results tests/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/