name: Robot Framework TNR Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ÉTAPE CRUCIALE : Installer Chrome explicitement
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install webdriver-manager
          pip install selenium

      # Vérifier que Chrome est bien installé
      - name: Verify Chrome installation
        run: |
          google-chrome --version

      - name: Start PetClinic
        run: |
          docker run -d -p 8080:8080 --name petclinic springcommunity/spring-framework-petclinic
          
          # Attendre que PetClinic soit vraiment prêt
          echo "Waiting for PetClinic to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "PetClinic is up!"
              break
            fi
            echo "Attempt $i/30 - PetClinic not ready yet..."
            sleep 2
          done

      - name: Run Robot Framework Tests
        run: |
          robot --outputdir results tests/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/