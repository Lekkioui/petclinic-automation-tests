name: Robot Framework TNR Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install webdriver-manager

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install ChromeDriver
        run: |
          pip install chromedriver-autoinstall
          python -c "import chromedriver_autoinstall; chromedriver_autoinstall.install()"

      - name: Start PetClinic
        run: |
          docker run -d -p 8080:8080 --name petclinic springcommunity/spring-framework-petclinic
          echo "Waiting for PetClinic to start..."
          sleep 45

      - name: Run Robot Framework Tests
        run: |
          robot --outputdir results tests/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/